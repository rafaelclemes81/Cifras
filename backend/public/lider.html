<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Painel do Líder</title>

<link
    rel="stylesheet"
    href="/css/style.css">

</head>

<body>

<div class="container">

    <h1 class="titulo-pagina">
        🎤 Painel do Líder
    </h1>

    <div class="painel-lider">

        <div class="sidebar">

            <div class="card">

                <h2>
                    Repertório
                </h2>

                <select id="repertorioSelect">

                    <option value="">
                        Selecione...
                    </option>

                </select>

                <br><br>

                <div class="grupo-botoes">

                    <button
                        id="btnIniciar"
                        class="btn-success">

                        ▶ Iniciar

                    </button>

                    <button
                        id="btnEncerrar"
                        class="btn-danger">

                        ⏹ Encerrar

                    </button>

                </div>

            </div>

            <div class="card">

                <h2>
                    Navegação
                </h2>

                <div class="navegacao-botoes">

                    <button id="btnAnterior">
                        ◀ Anterior
                    </button>

                    <button id="btnProxima">
                        Próxima ▶
                    </button>

                </div>

            </div>

            <!--<div class="card card-tom">

                <h2>
                    Tom Atual
                </h2>

                <div class="controle-tom">

                    <button id="diminuirTom">
                        -
                    </button>

                    <div
                        id="tomAtual"
                        class="tom-atual">

                        C
                    </div>

                    <button id="aumentarTom">
                        +
                    </button>

                </div>

            </div>-->

            <div class="card">

                <h2>
                    Controle
                </h2>

                <label>

                    Tom Atual

                </label>

                <div class="controle-tom">

                    <button id="diminuirTom">
                        -
                    </button>

                    <div
                        id="tomAtual"
                        class="tom-atual">

                        C

                    </div>

                    <button id="aumentarTom">
                        +
                    </button>

                </div>

                <br>

                <label>

                    Velocidade:
                    <span id="valorScroll">
                        3
                    </span>

                </label>

                <input
                    type="range"
                    id="scrollRange"
                    min="1"
                    max="10"
                    value="3">

                <br><br>

                <div class="controles-scroll">

                    <button
                        id="btnScrollPlay"
                        class="btn-success">

                        ▶

                    </button>

                    <button
                        id="btnScrollPause"
                        class="btn-warning">

                        ⏸

                    </button>

                    <button
                        id="btnScrollStop"
                        class="btn-danger">

                        ⏹

                    </button>

                </div>

                <div
                    id="statusScroll">

                    🔴 Parado

                </div>

            </div>

            <div class="card">

                <h2>
                    Visualização
                </h2>

                <button
                    id="btnTelaCheia">

                    ⛶ Tela Cheia

                </button>

                <br><br>

                <button
                    id="btnModoPalco">

                    🎤 Modo Palco

                </button>

            </div>

            <div class="card">

                <h2>
                    Sessão
                </h2>

                <div id="infoSessao">

                    Nenhuma sessão ativa

                </div>

            </div>

        </div>

        <div class="preview">

            <h2 id="tituloMusica">

                Nenhuma música

            </h2>

            <br>

            <div
                id="previewCifra"
                class="cifra-container">

            </div>

        </div>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/transpositor.js"></script>
<script src="/js/lider.js"></script>

</body>
</html>
