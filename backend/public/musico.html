<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Cifras Modo Músico</title>

    <link
        rel="stylesheet"
        href="/css/style.css">

</head>

<body>

<button
    id="btnMobileMenu"
    class="btn-mobile-menu">
    ⚙
</button>

<div class="painel-lider">

    <div
        class="sidebar"
        id="sidebarMusico">

        <div class="card">

            <h2>
                Scroll
            </h2>

            <div class="controle">

                <label>
                    Velocidade
                </label>

                <input
                    type="range"
                    id="scrollRange"
                    min="0"
                    max="10"
                    value="0">

            </div>

            <br>

            <button
                id="btnToggleControles"
                class="btn-primary">

                ☰ Ocultar

            </button>

        </div>

    </div>

    <div class="preview">

        <div class="info-musica">

            <div
                id="nomeMusica"
                class="nome-musica">

                Aguardando sessão...

            </div>

            <div
                id="tomMusica"
                class="tom-musica">

                -

            </div>

        </div>

        <div
            id="conteudoMusica"
            class="cifra-container">

        </div>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/transpositor.js"></script>
<script src="/js/musico.js"></script>

</body>

</html>
